<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern UI Pages</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
      padding:40px;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:25px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    h2{
      margin-bottom:15px;
      color:#333;
    }

    p{
      color:#666;
      margin-bottom:15px;
    }

    button{
      background:#4f46e5;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    button:hover{
      background:#4338ca;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    table th{
      background:#4f46e5;
      color:white;
      padding:12px;
    }

    table td{
      padding:12px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    table tr:hover{
      background:#f3f4f6;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- Welcome Card -->
  <div class="card">
    <h2>Welcome Page</h2>
    <p>This is a beautiful modern welcome UI design.</p>
    <button>Get Started</button>
  </div>

  <!-- Alert Button -->
  <div class="card">
    <h2>Interactive Button</h2>
    <p>Click the button below to see interaction.</p>
    <button onclick="showMessage()">Click Me</button>
  </div>

  <!-- Login Form -->
  <div class="card">
    <h2>Login Form</h2>

    <input type="text" placeholder="Enter Username">
    <input type="password" placeholder="Enter Password">

    <button style="width:100%">Login</button>
  </div>

  <!-- Stylish Table -->
  <div class="card">
    <h2>User Table</h2>

    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>

      <tr>
        <td>John</td>
        <td>22</td>
      </tr>

      <tr>
        <td>Alex</td>
        <td>25</td>
      </tr>

      <tr>
        <td>Sarah</td>
        <td>24</td>
      </tr>
    </table>
  </div>

</div>

<script>
  function showMessage(){
    alert("Welcome to Modern UI Design!");
  }
</script>

</body>
</html>
