<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarti-4 | Feature Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #080818;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            animation: pulse 8s infinite alternate ease-in-out;
        }
        .blob-1 { background: #F72585; top: -100px; left: -100px; }
        .blob-2 { background: #7209B7; bottom: -100px; right: -100px; animation-delay: -4s; }
        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(40px, 40px); }
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg,#fff,#ffb3d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }
        p {
            font-size: 1.3rem;
            color: #aaa;
            max-width: 500px;
            margin: 0 auto 2.5rem;
        }
        .branch-tag {
            display: inline-block;
            background: linear-gradient(135deg,#F72585,#7209B7);
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 8px 25px rgba(247,37,133,0.5);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="content">
        <div class="badge">ðŸŒ¿ feature/Aarti-4</div>
        <h1>Aarti - 4</h1>
        <p>This is the dedicated feature page for branch Aarti-4. Looking great and ready to build!</p>
        <div class="branch-tag">âœ¦ Branch 4 Active</div>
    </div>
</body>
</html>
